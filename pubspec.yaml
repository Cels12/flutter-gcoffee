name: gcoffee_r
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0-323.2.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  heroicons: ^0.11.0
  sidebarx: ^0.17.1
  supabase_auth_ui: ^0.5.4
  easy_sidemenu: ^0.6.1
  flutter_svg: ^2.0.17
  flutter_dotenv: ^5.2.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  toastification: ^3.0.2
  provider: ^6.1.2
  google_sign_in: ^6.3.0
  go_router: ^14.8.1
  syncfusion_flutter_datagrid_export: ^29.1.37
  syncfusion_flutter_xlsio: ^29.1.38
  syncfusion_flutter_pdf: ^29.1.38
  open_file: ^3.5.10
  universal_html: ^2.2.4
  file: ^7.0.1
  path: ^1.9.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/kopi_cropped.png
    - assets/img/kopi.png
    - assets/img/Cappuccino.jpg
    - assets/img/Machiato.jpg
    - assets/img/Mocha2.jpg
    - assets/img/espresso.jpg
    - assets/icons/Google.svg
    - assets/icons/google2.svg
    - assets/icons/minus-sm.svg
    - assets/.env
    - assets/icons/Home.svg
    - assets/icons/Coffee_cup.svg
    - assets/icons/Chart_trendUp.svg
    - assets/icons/coffeedinein.svg
    - assets/icons/coffeetakeaway.svg

  fonts:
    - family: Righteous
      fonts:
        - asset: assets/font/Righteous-Regular.ttf
    - family: Oxanium
      fonts:
        - asset: assets/font/Oxanium-Regular.ttf
        - asset: assets/font/Oxanium-Bold.ttf
        - asset: assets/font/Oxanium-ExtraBold.ttf
        - asset: assets/font/Oxanium-Light.ttf
        - asset: assets/font/Oxanium-Medium.ttf
        - asset: assets/font/Oxanium-SemiBold.ttf
        - asset: assets/font/Oxanium-Extralight.ttf
